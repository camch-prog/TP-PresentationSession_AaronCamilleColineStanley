<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="team">
        <h2>Notre équipe</h2>
        <div class="team-grid">
            <div class="team-card" id="Aaron">
                <div class="img-contener">
                    <img class="team-card-img" src="./photos/Aaron.png" alt="Aaron">
                    <img class="team-card-img-bis" src="./photos/Aaron-hover.jpg" alt="Aaron-hover">
                </div>
                <h3>Aaron</h3>
                <p><strong>Age : </strong>26 ans 
                </p>
            </div>
            <div class="team-card" id="Camille">
                <div class="img-contener">
                    <img class="team-card-img" src="./photos/Camille.png" alt="Camille">
                    <img class="team-card-img-bis"  src="./photos/Camille-hover.jpg" alt="Camille-hover">
                </div>
                <h3>Camille</h3>
                <p><strong>Age : </strong>30 ans 
                </p>
            </div>
            <div class="team-card" id="Coline">
                <div class="img-contener">
                    <img class="team-card-img" src="./photos/Coline.png" alt="Coline">
                    <img class="team-card-img-bis" src="./photos/Coline-hover.jpg" alt="Coline-hover">
                </div>
                <h3>Coline</h3>
                <p><strong>Age : </strong>29 ans
                </p>
            </div>
            <div class="team-card" id="Stanley">
                <div class="img-contener">
                    <img class="team-card-img" src="./photos/Stanley.png" alt="Stanley">
                    <img class="team-card-img-bis" src="./photos/Stanley-hover.jpg" alt="Stanley-hover">
                </div>
                <h3>Stanley</h3>
                <p><strong>Age : </strong>25 ans 
                </p>
            </div>
        </div>
        <p><em>Survolez l'image pour voir l'Animal Totem de chaque membre !</Em></p>
    </section>
</body>
</html>
