<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="formulaire.css">
    <title>Document</title>
</head>
<body>
    <form action="#" method="POST">
        <h2>Nous contacter</h2>
        <div class="formulairecard">
        <fieldset>
            <legend>Vos informations</legend>
            <label for="nom">Nom</label>
            <input type="text" placeholder="Ex Dubois" name="nom" minlength="2" id="nom">
            <label for="prenom" >Prénom</label>
            <input type="text" name="prenom" id="prenom" placeholder="Ex Mirelle" minlength="2">
            <label for="email">Email</label>
            <input type="email" placeholder="monmail@mail.com" name="email" id="email" minlength="2">
            <label for="tel">Numéro</label>
            <input type="tel" placeholder="Ex 00 11 22 33 44" name="numero" id="tel" maxlength="10">
        </fieldset>
        <fieldset>
            <legend>Votre demande</legend>
            <label for="liste">Objet de la demande</label>
            <select name="liste" id="liste">
                <option value="rdv">Obtenir un rendez-vous</option>
                <option value="info" selected>Demander des informations</option>
                <option value="rejoindre">Rejoindre la formation</option>
            </select>
            <p>Qui voulez-vous contacter ?</p>
            <div class="sectionradio">
                <div class="boutonradio">
                <input type="radio" name="personne" id="coline" value="coline" checked><label for="coline">Coline</label>
                </div>
                <div class="boutonradio">
                    <input type="radio" name="personne" id="camille" value="camille"><label for="camille">Camille</label>
                </div>
                <div class="boutonradio">
                    <input type="radio" name="personne" id="aaron" value="aaron"><label for="aaron">Aaron</label>
                </div>
                <div class="boutonradio">
                    <input type="radio" name="personne" id="stanley" value="stanley"><label for="stanley">Stanley</label>
                </div>
            </div>
            <label for="message">Ajoutez un message</label>
            <textarea cols="20" rows="10" placeholder="Ecrivez votre message ici" name="message" id="message"></textarea>
        </fieldset>
        </div>
        </div>
        <div class="boutons">
            <button type="submit" value="Envoyer"> Envoyer </button>
            <button type="reset" value="reset"> Reset </button>
        </div>
    </form>
    
    
</body>
</html>
